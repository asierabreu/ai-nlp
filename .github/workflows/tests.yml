name: Run Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
        project:
          - projects/nlp-knowledge-graph
          - projects/llm-fine-tuning-toolkit
          - projects/domain-specific-llm
          - projects/text2kg-demo
          - projects/nlp-annotation-tool
          - shared

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ${{ matrix.project }}/requirements.txt ]; then
            pip install -r ${{ matrix.project }}/requirements.txt
          fi
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -d ${{ matrix.project }}/tests ]; then
            pytest ${{ matrix.project }}/tests/ -v --cov=${{ matrix.project }}/src --cov-report=xml
          else
            echo "No tests found for ${{ matrix.project }}, skipping."
          fi

  test-website:
    name: Website Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
