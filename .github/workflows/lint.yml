name: Lint Code

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort

      - name: Run ruff
        run: ruff check projects/ shared/

      - name: Run black (check only)
        run: black --check projects/ shared/

      - name: Run isort (check only)
        run: isort --check-only projects/ shared/

  lint-javascript:
    name: Lint JavaScript/TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio-website

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio-website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint
