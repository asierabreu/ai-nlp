version: "3.9"

services:
  # Portfolio website (Next.js)
  portfolio-website:
    build:
      context: ./portfolio-website
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  # text2kg-demo backend (FastAPI)
  # Build context is the project root so the Dockerfile can access requirements.txt
  text2kg-backend:
    build:
      context: ./projects/text2kg-demo
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # nlp-annotation-tool backend
  # Build context is the project root so the Dockerfile can access requirements.txt
  annotation-backend:
    build:
      context: ./projects/nlp-annotation-tool
      dockerfile: backend/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - annotation_data:/app/data
    restart: unless-stopped

  # Neo4j graph database
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  annotation_data:
