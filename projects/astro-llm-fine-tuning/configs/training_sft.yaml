experiment:
  name: "scientific-sft"
  output_dir: "outputs/sft"

model:
  config_file: "configs/model_125m.yaml"

data:
  train_path: "data/processed/sft"
  eval_path: "data/processed/sft_eval"

training:
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-5
  max_steps: 500
  save_steps: 50
  eval_steps: 50
  bf16: true
  gradient_checkpointing: true
  backend: "deepspeed"  # fsdp | deepspeed | single

tracking:
  use_wandb: true
  project: "astro-llm-fine-tuning"
