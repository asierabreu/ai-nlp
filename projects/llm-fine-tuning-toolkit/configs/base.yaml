# Base training configuration
model:
  name: "gpt2"
  load_in_4bit: false
  load_in_8bit: false
  trust_remote_code: false

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: ["c_attn", "c_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./output"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  weight_decay: 0.001
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 25
  save_steps: 500
  eval_steps: 500
  max_seq_length: 512
  fp16: false
  bf16: false

wandb:
  project: "llm-fine-tuning"
  enabled: false
