# LoRA configuration for Llama-family models
# Inherits from base.yaml — override values here

model:
  name: "meta-llama/Llama-3.2-1B"
  load_in_4bit: true
  trust_remote_code: false

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./output/llama-lora"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  bf16: true
  max_seq_length: 2048

wandb:
  project: "llama-lora-finetune"
  enabled: true
