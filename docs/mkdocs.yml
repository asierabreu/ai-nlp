site_name: AI/NLP Projects
site_description: A portfolio of Natural Language Processing, Knowledge Graph, and LLM fine-tuning projects.
site_author: Asier Abreu
site_url: https://asierabreu.github.io/ai-nlp/

repo_name: asierabreu/ai-nlp
repo_url: https://github.com/asierabreu/ai-nlp

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Projects:
      - Overview: projects.md
      - NLP Knowledge Graph: projects/nlp-knowledge-graph.md
      - LLM Fine-Tuning Toolkit: projects/llm-fine-tuning-toolkit.md
      - Domain-Specific LLM: projects/domain-specific-llm.md
      - Scientific LLM Finetunning: projects/scientific-llm-finetunning.md
      - Text-to-KG Demo: projects/text2kg-demo.md
      - NLP Annotation Tool: projects/nlp-annotation-tool.md
  - Setup: setup.md
  - Architecture: architecture.md
  - Contributing: contributing.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/asierabreu
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/asierabreu
  generator: false

copyright: Copyright &copy; 2024 Asier Abreu &mdash; MIT License
